intro: "Tusmo ry järjestää vuoden aikana erilaisia tapahtumia, juhlia, leirejä ja yhteisötilaisuuksia."
slogan: "Yhdessä kohti parempaa."
categories:
  - name: "Kesäleirit ja päiväleirit"
    description: "Kesäisin järjestämme lapsille ja nuorille päiväleirejä, retkiä ja muuta lomatoimintaa."
  - name: "Liikuntaturnaukset"
    description: "Järjestämme futsal-, jalkapallo- ja koripalloturnauksia sekä muita liikuntatapahtumia lapsille ja nuorille."
  - name: "Itsenäisyyspäivän juhla"
    description: "Yhdistys pyrkii järjestämään vuosittain itsenäisyyspäivän juhlan, jossa tutustutaan Suomen historiaan, kulttuuriin ja yhteisiin arvoihin."
  - name: "Koulujen loma-aikojen tapahtumat"
    description: "Koulujen loma-aikojen alkaessa järjestämme lapsille, nuorille ja perheille tapahtumia sekä toimintaa, jotka tarjoavat turvallista ja mielekästä tekemistä vapaa-ajalle."
  - name: "Eid-juhlat ja kulttuuritapahtumat"
    description: "Järjestämme yhteisöllisiä juhlia ja tapahtumia, jotka vahvistavat yhteisöllisyyttä sekä eri kulttuurien välistä vuoropuhelua."
  - name: "Turvallisuus- ja infotilaisuudet"
    description: "Järjestämme tarvittaessa asukkaille suunnattuja infotilaisuuksia ajankohtaisista aiheista. Tavoitteena on järjestää myös turvallisuuteen liittyviä keskustelu- ja infotilaisuuksia esimerkiksi tulipalojen ehkäisystä, kotien turvallisuudesta sekä arjen varautumisesta yhteistyössä viranomaisten ja muiden toimijoiden kanssa."
