tagline: "Yhdessä kohti parempaa"
mission: "Tarjota lapsille, nuorille ja perheille turvallinen ympäristö harrastaa, oppia, osallistua ja kasvaa osana yhteisöä."
vision: "Vantaa, jossa jokaisella lapsella, nuorella ja perheellä on mahdollisuus osallistua, onnistua ja tuntea kuuluvansa yhteisöön."
slogan: "Yhdessä kohti parempaa."
operating_area: "Tusmo ry toimii erityisesti Länsi-Vantaan alueella. Järjestämme toimintaa muun muassa Myyrmäessä, Kilterissä, Pähkinärinteessä, Uomarinteessä ja lähialueilla. Toimintaan ovat tervetulleita kaikki lapset, nuoret ja perheet taustasta riippumatta."
core_values:
  - Yhteisöllisyys
  - Yhdenvertaisuus
  - Osallisuus
  - Hyvinvointi
  - Monikulttuurisuus
  - Vastuullisuus
