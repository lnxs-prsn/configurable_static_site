{% extends "_base.html" %}

{% block content %}
<!-- Contact page content -->
<section class="bg-background bg-texture py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold text-text-primary mb-8">Yhteystiedot</h1>

    <!-- Organization details -->
    <div class="mb-10 space-y-2 text-text-secondary">
      <p class="font-bold text-text-primary text-lg">{{ contact.name }}</p>
      <p>{{ contact.address }}</p>
      <p>{{ contact.phone }}</p>
      <p>{{ contact.email }}</p>
    </div>

    <!-- Contact form -->
    <div id="form-area" class="bg-surface border border-muted rounded-lg p-6">
      <form
        id="contact-form"
        hx-post="{{ config.form_endpoint }}"
        hx-swap="none"
        hx-indicator="#form-spinner"
        hx-on::after-request="
          document.getElementById('contact-form').style.display='none';
          document.getElementById(event.detail.successful ? 'form-success' : 'form-error').style.display='block';
        "
      >
        <div class="space-y-4">
          <!-- Name -->
          <div>
            <label for="name" class="block text-sm font-medium text-text-primary mb-1">Nimi</label>
            <input
              type="text"
              id="name"
              name="name"
              required
              class="w-full px-4 py-2 border border-muted rounded-lg bg-surface text-text-primary focus:outline-none focus:ring-2 focus:ring-accent"
            >
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-text-primary mb-1">Sähköpostiosoite</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="w-full px-4 py-2 border border-muted rounded-lg bg-surface text-text-primary focus:outline-none focus:ring-2 focus:ring-accent"
            >
          </div>

          <!-- Message -->
          <div>
            <label for="message" class="block text-sm font-medium text-text-primary mb-1">Viesti</label>
            <textarea
              id="message"
              name="message"
              rows="5"
              required
              class="w-full px-4 py-2 border border-muted rounded-lg bg-surface text-text-primary focus:outline-none focus:ring-2 focus:ring-accent resize-vertical"
            ></textarea>
          </div>

          <!-- Submit button and spinner -->
          <div class="flex items-center gap-4">
            <button
              type="submit"
              {% if not config.form_endpoint %}disabled title="Lomake ei ole vielä käytössä."{% endif %}
              class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary-light transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Lähetä viesti
            </button>
            <span id="form-spinner" class="htmx-indicator">
              <svg class="animate-spin h-5 w-5 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            </span>
          </div>
        </div>
      </form>

      <!-- Pre-rendered partials, CSS-hidden. hx-on::after-request reveals the correct one. -->
      <div id="form-success" style="display:none">
        {% include '_partials/form-success.html' %}
      </div>
      <div id="form-error" style="display:none">
        {% include '_partials/form-error.html' %}
      </div>
    </div>
  </div>
</section>
{% endblock %}
